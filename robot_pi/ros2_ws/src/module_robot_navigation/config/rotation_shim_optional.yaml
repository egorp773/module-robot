# OPTIONAL ONLY -- not loaded by any launch file.
#
# If field tests show RPP's built-in rotate-to-heading is insufficient, replace
# the direct FollowPath plugin with this wrapper and move the complete RPP
# parameter set under primary_controller. Never enable this at the same time as
# an independently tuned RPP rotate-to-heading behavior without a review.
controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      angular_dist_threshold: 0.785      # TODO_CALIBRATE
      angular_disengage_threshold: 0.3925
      forward_sampling_distance: 0.40   # TODO_CALIBRATE
      rotate_to_heading_angular_vel: 0.25
      max_angular_accel: 0.25
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false
      closed_loop: true
      primary_controller:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
        desired_linear_vel: 0.10
        lookahead_dist: 0.40
        min_lookahead_dist: 0.20
        max_lookahead_dist: 0.60
        lookahead_time: 1.5
        use_velocity_scaled_lookahead_dist: true
        use_rotate_to_heading: false
        allow_reversing: false
        stateful: true
        use_collision_detection: false
