# TEMPLATE ONLY. Enable only after ENU yaw and navsat_transform are validated.
# Global EKF owns map -> odom; local_ekf continues to own odom -> base_link.
global_ekf:
  ros__parameters:
    frequency: 20.0
    sensor_timeout: 0.30
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.20
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: /odometry/filtered
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # navsat_transform output: global x/y only.
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false

    # Absolute IMU yaw remains disabled until heading initialization proves the
    # axis mapping and offset. Angular velocity is safe to template now.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
