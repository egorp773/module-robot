# TEMPLATE ONLY. launch/localization_templates.launch.py leaves this disabled.
# Local EKF owns odom -> base_link and never fuses GPS.
local_ekf:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.20
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.10
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Future motor-derived velocity estimate. Pose is deliberately ignored.
    odom0: /motor/odometry
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # Fuse angular velocity only until IMU axes/covariances are proven.
    # Linear acceleration is intentionally disabled in this initial template.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
