[platformio]
test_dir = navigation_core/test
build_dir = .pio/build_root
src_dir = rtk_firmware/src
lib_dir = rtk_firmware/lib

[env:native]
platform = native
test_framework = googletest
extra_scripts = pre:navigation_core/pio_native_toolchain.py
lib_extra_dirs = rtk_firmware/lib
lib_ignore = Motor
build_flags =
  -std=c++17
  -Wall
  -Wextra
  -I navigation_core
  -I rtk_firmware/lib/NavMath/src
  -I rtk_firmware/lib/Motor/src

[env:rover]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default
lib_deps =
  https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library/archive/refs/heads/main.zip
  https://github.com/adafruit/Adafruit_BNO08x/archive/refs/heads/master.zip
  ESP32Async/ESPAsyncWebServer@^3.7.0
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCORE_DEBUG_LEVEL=3
  -DUSER_SETUP_LOADED=1
  -DROLE_ROVER
  -I rtk_firmware/include
  -I rtk_firmware/lib
build_src_filter = +<*> -<.git/> -<base.cpp>
