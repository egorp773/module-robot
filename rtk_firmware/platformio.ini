[platformio]
default_envs = rover
build_dir = ../.pio/build_rtk
test_dir = test

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default
lib_deps =
    https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library/archive/refs/heads/main.zip
    https://github.com/adafruit/Adafruit_BNO08x/archive/refs/heads/master.zip
    ESP32Async/ESPAsyncWebServer@^3.7.0
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    -DUSER_SETUP_LOADED=1
    -I include
    -I lib

[env:rover]
build_flags =
    ${env.build_flags}
    -DROLE_ROVER
build_src_filter = +<*> -<.git/> -<base.cpp> -<pi_bridge.cpp>

[env:base]
build_flags =
    ${env.build_flags}
    -DROLE_BASE
build_src_filter = +<*> -<.git/> -<rover.cpp> -<pi_bridge.cpp>

[env:pi_bridge]
; UART0/USB is a binary-only COBS transport. Redirect every library Serial
; call to a null Stream so boot/runtime text can never corrupt motor commands.
monitor_speed = 460800
build_unflags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library/archive/refs/heads/main.zip
    https://github.com/adafruit/Adafruit_BNO08x/archive/refs/heads/master.zip
build_flags =
    ${env.build_flags}
    -DROLE_PI_BRIDGE
    -DCORE_DEBUG_LEVEL=0
    -DNO_GLOBAL_SERIAL
    -DSerial=PiBridgeLibraryLogSink
    -DPI_BRIDGE_SERIAL_BAUD=460800
    -I lib/PiBridgeHardware/src
    -include PiBridgeLogSink.h
build_src_filter = +<pi_bridge.cpp>
